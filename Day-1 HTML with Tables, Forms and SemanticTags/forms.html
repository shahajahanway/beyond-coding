    <h2 style="text-align: center">Student Registration form</h2>
    <hr />

    <form >
      <fieldset>
        <legend>Personal Info</legend>

        <label for="name">Name</label><br />
        <input 
          type="text"
          id="name"
          required
          placeholder="Enter your name..."
        /><br /><br />

        <label for="email">Email</label><br />
        <input 
          type="email"
          required
          id="email"
          placeholder="Enter your email..."
        /><br /><br />

        <label for="name">Phone number</label><br />
        <input 
          type="text"
          required
          id="name"
          placeholder="Enter your Number..."
        /><br /><br />
        <label for="studentimage">Student Photo</label>
        <input  type="file" type="image" id="studentimage">
      </fieldset>
      <br />
      <br />
      <fieldset>
        <legend>Address Details</legend>

        <label for="addressline1">Address</label>
        <textarea
          name=""
          id="addressline1"
          placeholder="address"
          rows="4"
        ></textarea><br />

        <label for="city">City</label>
        <select id="city">
          <option>City</option>
          <option>Siliguri</option>
          <option>Gurguam</option>
          <option>Mumbai</option>
        </select>
        <br /><br />
        <label for="states">States</label>
        <select id="states">
          <option>Choose States</option>
          <option>West Bangal</option>
          <option>Up</option>
          <option>UK</option>
          <option>Bihar</option>
        </select>
      </fieldset>
      <br /><br />
      <label for="courses">Courses</label>
      <select id="courses">
        <optgroup label="Frontend">
          <option>Html</option>
          <option>Css</option>
          <option>Js</option>
        </optgroup>
        <optgroup label="Backend">
          <option>Advance JavaScript</option>
          <option>Nodejs</option>
          <option>MongoDB</option>
        </optgroup>
      </select>
      <br /><br />
      <button>Submite form</button>
    </form>
