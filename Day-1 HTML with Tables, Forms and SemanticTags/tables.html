<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h1>Learn Tables Tags </h1>

    <table border="5">
        <caption>Main Items</caption>
        <colgroup>
            <col style="background-color: rgb(159, 159, 237); ">
            <col style="background-color: rgb(221, 192, 148); ">
            <col style="background-color: rgb(167, 234, 171); ">
        </colgroup>

        <thead >
           <tr>
            <th>Name</th>
            <th>Quantity</th>
            <th>Price</th>
           </tr> 
        </thead>

        <tbody>
            <tr>
                <td>Phone</td>
                <td>2</td>
                <td>50000</td>
            </tr>
            <tr>
                <td>iPhone 15</td>
                <td>1</td>
                <td>100000</td>
            </tr>
            <tr>
                <td>Laptop</td>
                <td>1</td>
                <td>200000</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th colspan="2">Total Price</th>
                <th >350000</th>
            </tr>
        </tfoot>

    </table>
    
</body>
</html>
